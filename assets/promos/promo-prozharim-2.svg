<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFire" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090403"/>
      <stop offset="0.5" stop-color="#1B0C06"/>
      <stop offset="1" stop-color="#080302"/>
    </linearGradient>

    <linearGradient id="accentFire" x1="100" y1="80" x2="1400" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A18"/>
      <stop offset="0.5" stop-color="#FF4E00"/>
      <stop offset="1" stop-color="#C93A00"/>
    </linearGradient>

    <linearGradient id="pillFire" x1="0" y1="0" x2="260" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD29A"/>
      <stop offset="1" stop-color="#FF7A18"/>
    </linearGradient>

    <filter id="blurGlowFire" x="-100" y="-100" width="1800" height="800">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="40" fill="url(#bgFire)"/>

  <g filter="url(#blurGlowFire)" opacity="0.9">
    <circle cx="1250" cy="120" r="180" fill="#FF7A18" fill-opacity="0.25"/>
    <circle cx="300" cy="460" r="200" fill="#FF4E00" fill-opacity="0.16"/>
    <circle cx="900" cy="310" r="260" fill="#FF7A18" fill-opacity="0.15"/>
  </g>

  <path d="M0 100C180 60 340 60 500 100C660 140 830 140 1000 100C1180 60 1380 70 1600 140V520H0V100Z"
