  <circle cx="1470" cy="90" r="200" fill="#FFFFFF10"/>
  <circle cx="1470" cy="90" r="120" fill="#FFFFFF08"/>

  <text x="90" y="100" fill="#FFD29A" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="8">
